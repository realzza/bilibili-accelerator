name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Unit tests
        run: node --test
      - name: Build
        run: node scripts/build.mjs
      - name: dist/ is committed in sync with src/
        run: git diff --exit-code -- dist
