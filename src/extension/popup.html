<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bilibili Accelerator</title>
  <style>
    :root { color-scheme: light dark; }
    body {
      width: 268px; margin: 0; padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: #17202a; background: #fff;
    }
    .head { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
    .head svg { width: 18px; height: 18px; color: #00aeec; }
    .head h1 { font-size: 14px; font-weight: 800; margin: 0; }
    .row {
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
      padding: 11px 12px; border: 1px solid #e5eaf0; border-radius: 10px; background: #fff;
    }
    .row .t { display: grid; gap: 2px; }
    .row .title { font-size: 13px; font-weight: 700; }
    .row .note { font-size: 11px; color: #6b7785; }
    .switch { position: relative; width: 42px; height: 24px; flex: 0 0 auto; }
    .switch input { position: absolute; opacity: 0; width: 1px; height: 1px; }
    .slider { position: absolute; inset: 0; border-radius: 999px; background: #c9d3dd; cursor: pointer; transition: background .16s; }
    .slider:before { content: ""; position: absolute; width: 20px; height: 20px; left: 2px; top: 2px; border-radius: 50%; background: #fff; box-shadow: 0 2px 6px rgba(0,0,0,.22); transition: transform .16s; }
    .switch input:checked + .slider { background: #00aeec; }
    .switch input:checked + .slider:before { transform: translateX(18px); }
    .hint { font-size: 11px; color: #6b7785; line-height: 1.5; margin: 12px 2px 0; }
    .lang { margin-left: auto; display: inline-flex; border: 1px solid #d5dde5; border-radius: 8px; overflow: hidden; }
    .lang-btn { border: none; background: #fff; color: #6b7785; font-size: 11px; font-weight: 700; padding: 4px 10px; cursor: pointer; }
    .lang-btn + .lang-btn { border-left: 1px solid #e5eaf0; }
    .lang-btn.active { background: #00aeec; color: #fff; }
    @media (prefers-color-scheme: dark) {
      body { background: #1b1f24; color: #e6eaee; }
      .row { background: #23282e; border-color: #333a42; }
      .row .note, .hint { color: #98a3ad; }
      .lang, .lang-btn + .lang-btn { border-color: #333a42; }
      .lang-btn { background: #23282e; color: #98a3ad; }
      .lang-btn.active { background: #00aeec; color: #fff; }
    }
  </style>
</head>
<body>
  <div class="head">
    <svg viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M13 2 4 14h7l-1 8 10-13h-7l1-7Z"/></svg>
    <h1 data-i18n="title">Bilibili Accelerator</h1>
    <div class="lang">
      <button type="button" class="lang-btn" data-lang="en">EN</button>
      <button type="button" class="lang-btn" data-lang="zh">中</button>
    </div>
  </div>

  <div class="row">
    <span class="t">
      <span class="title" data-i18n="accelTitle">Acceleration</span>
      <span class="note" data-i18n="accelNote">Speed up slow videos</span>
    </span>
    <label class="switch">
      <input type="checkbox" id="enabled" />
      <span class="slider"></span>
    </label>
  </div>

  <p class="hint" data-i18n="hint">Open a Bilibili video and tap the ⚡ in the corner for live status and advanced settings.</p>

  <script src="popup.js"></script>
</body>
</html>
